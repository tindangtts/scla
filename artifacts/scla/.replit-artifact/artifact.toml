kind = "web"
previewPath = "/"
title = "Star City Living App"
version = "1.0.0"
id = "artifacts/scla"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20739

[services.development]
run = "pnpm --filter @workspace/scla run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scla", "run", "build" ]
publicDir = "artifacts/scla/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20739"
BASE_PATH = "/"
