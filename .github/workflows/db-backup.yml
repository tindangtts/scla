# CICD-04: Daily PostgreSQL backup automation
# Backups stored as GitHub Actions artifacts with 30-day retention
# Manual trigger available via workflow_dispatch
#
# REQUIRED SECRET: DATABASE_URL — production PostgreSQL connection string
# Format: postgresql://user:password@host:port/database?sslmode=require

name: Daily DB Backup

on:
  schedule:
    # Daily at 2 AM UTC (8:30 AM MMT — Myanmar Standard Time is UTC+6:30)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Manual trigger for on-demand backups

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Create Backup
        id: dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="scla_backup_${TIMESTAMP}.sql.gz"
          pg_dump "$DATABASE_URL" --no-owner --no-acl --clean --if-exists | gzip > "$BACKUP_FILE"
          echo "backup_file=$BACKUP_FILE" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "Backup created: $BACKUP_FILE"

      - name: Verify Backup
        run: |
          BACKUP_FILE="${{ steps.dump.outputs.backup_file }}"
          SIZE=$(stat -f%z "$BACKUP_FILE" 2>/dev/null || stat --format=%s "$BACKUP_FILE")
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Backup file too small ($SIZE bytes), likely failed"
            exit 1
          fi
          # Verify key tables are present in the dump
          zcat "$BACKUP_FILE" | grep -q "CREATE TABLE" || { echo "::error::No CREATE TABLE found in backup"; exit 1; }
          echo "Backup verified: $BACKUP_FILE ($SIZE bytes)"

      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.dump.outputs.timestamp }}
          path: ${{ steps.dump.outputs.backup_file }}
          retention-days: 30

      - name: Cleanup old backups
        run: |
          # GitHub artifact retention handles cleanup automatically
          # Artifacts older than 30 days are automatically deleted by GitHub
          echo "Artifact retention is set to 30 days — GitHub handles cleanup automatically"
