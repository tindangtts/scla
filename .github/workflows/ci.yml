# CI/CD Pipeline for Star City Living App (SCLA)
#
# CICD-01: The validate job runs lint (prettier), typecheck, and tests on every push and PR to main.
#          A PR with formatting errors, type errors, or failing tests will show a failing CI check.
#
# CICD-02: To enforce merge blocking, configure GitHub branch protection:
#          Settings > Branches > Branch protection rules > Add rule for "main":
#            - Require status checks to pass: check "validate"
#            - Require branches to be up to date before merging
#          IMPORTANT: This is a manual configuration step in the GitHub repository settings.
#
# CICD-03: The deploy job triggers a Replit redeploy on merge to main (after validate succeeds).
#          Configure the REPLIT_DEPLOY_HOOK_URL secret in GitHub repository settings.

name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Prettier)
        run: pnpm run format:check

      - name: Type Check
        run: pnpm run typecheck

      - name: Push DB schema
        run: pnpm --filter db push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          NODE_ENV: test

      - name: Tests
        run: pnpm run test:ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          NODE_ENV: test

  deploy:
    name: Deploy to Replit
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Replit Deploy
        # Requires REPLIT_DEPLOY_HOOK_URL secret to be set in GitHub repository settings.
        # If the secret is not configured, this step will still succeed (continue-on-error: true).
        continue-on-error: true
        run: curl -X POST "$REPLIT_DEPLOY_HOOK_URL"
        env:
          REPLIT_DEPLOY_HOOK_URL: ${{ secrets.REPLIT_DEPLOY_HOOK_URL }}
